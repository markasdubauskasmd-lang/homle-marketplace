name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit, syntax and safety checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
          pnpm --version
      - name: Install dependencies (locked, no lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Verify dependency lock
        run: node tools/check-dependency-lock.mjs
      - name: Syntax and safety checks
        run: pnpm run check
      - name: Test suite (pretest + test + posttest)
        run: pnpm test

  database:
    name: Real PostgreSQL integration and RLS
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      # Non-secret disposable credentials for an ephemeral, throwaway CI database only.
      OWNER_PW: ci_owner_pw
      APP_PW: ci_app_pw
      WORKER_PW: ci_worker_pw
      TEST_DB: ci_tideway_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install PostgreSQL 16 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-16
          psql --version
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
      - name: Install dependencies (locked, no lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Provision disposable roles, database and extensions
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U postgres -d postgres <<SQL
          CREATE ROLE tideway_owner LOGIN PASSWORD '${OWNER_PW}';
          CREATE ROLE tideway_app LOGIN PASSWORD '${APP_PW}';
          CREATE ROLE tideway_worker LOGIN PASSWORD '${WORKER_PW}';
          CREATE DATABASE ${TEST_DB} OWNER tideway_owner;
          SQL
          # Extensions require superuser or trusted-extension handling; create them
          # as the postgres superuser so the non-superuser owner never needs it.
          psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U postgres -d "${TEST_DB}" <<SQL
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          CREATE EXTENSION IF NOT EXISTS citext;
          CREATE EXTENSION IF NOT EXISTS btree_gist;
          GRANT ALL ON SCHEMA public TO tideway_owner;
          SQL
      - name: Apply locked migrations and role grants as the migration owner
        env:
          PGPASSWORD: ${{ env.OWNER_PW }}
        run: |
          set -euo pipefail
          for file in $(ls db/migrations/*.sql | sort); do
            echo "Applying ${file}"
            psql -v ON_ERROR_STOP=1 -X -h "$PGHOST" -p "$PGPORT" -U tideway_owner -d "${TEST_DB}" -f "${file}"
          done
          for grant in db/runtime-role-grants.sql db/worker-role-grants.sql; do
            echo "Applying ${grant}"
            psql -v ON_ERROR_STOP=1 -X -h "$PGHOST" -p "$PGPORT" -U tideway_owner -d "${TEST_DB}" -f "${grant}"
          done
      - name: Run real PostgreSQL integration, RLS and concurrency suite
        env:
          DATABASE_INTEGRATION_OWNER_URL: postgresql://tideway_owner:${{ env.OWNER_PW }}@localhost:5432/ci_tideway_test
          DATABASE_INTEGRATION_APP_URL: postgresql://tideway_app:${{ env.APP_PW }}@localhost:5432/ci_tideway_test
          DATABASE_INTEGRATION_WORKER_URL: postgresql://tideway_worker:${{ env.WORKER_PW }}@localhost:5432/ci_tideway_test
          TIDEWAY_DATABASE_TEST_CONFIRMATION: RUN TIDEWAY DISPOSABLE DATABASE TESTS
        run: node tools/postgres-integration-runner.mjs
