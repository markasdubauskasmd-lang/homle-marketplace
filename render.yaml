# Safe Render staging foundation. The owner approved one free PostgreSQL staging
# database for real account and mobile-flow testing. Marketplace traffic remains
# closed until the database is bootstrapped and every private dependency passes.
services:
  - type: web
    name: homle-marketplace-preview
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: "off"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node scripts/render-staging-entrypoint.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: HOST
        value: "0.0.0.0"
      - key: LAN_PORT
        value: "0"
      - key: DATA_DIR
        value: "/var/lib/tideway"
      - key: APP_ORIGIN
        value: "https://homle-marketplace-preview.onrender.com"
      - key: RENDER_STAGING_BOOTSTRAP_ENABLED
        value: "true"
      - key: DATABASE_BOOTSTRAP_URL
        fromDatabase:
          name: homle-marketplace-staging-db
          property: connectionString
      - key: TIDEWAY_APP_PASSWORD
        generateValue: true
      - key: TIDEWAY_WORKER_PASSWORD
        generateValue: true
      - key: ADMIN_REQUIRE_KEY
        value: "true"
      - key: ADMIN_KEY
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      - key: TRUST_PROXY_PROVIDER
        value: "render"
      - key: TRUSTED_PROXY_CIDRS
        value: ""
      - key: MARKETPLACE_ADAPTER_MODULE
        value: "homle:render-log-monitoring"
      - key: RENDER_LOG_MONITORING_ACKNOWLEDGED
        value: "false"
      - key: PILOT_INTAKE_ENABLED
        value: "false"
      - key: MARKETPLACE_ENABLED
        value: "false"
      - key: MARKETPLACE_WORKER_ENABLED
        value: "false"
      - key: WORKER_EMAIL_ENABLED
        value: "false"
      - key: WORKER_MEDIA_ENABLED
        value: "false"
      - key: WORKER_AUTOMATIC_DISPATCH_ENABLED
        value: "false"
      - key: PAYMENTS_ENABLED
        value: "false"

databases:
  - name: homle-marketplace-staging-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
    databaseName: homle_marketplace_homle_staging
    user: homle_migration_owner
    ipAllowList: []
